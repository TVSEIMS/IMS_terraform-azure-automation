name: Create VM Workflow

on:
  repository_dispatch:
    types: [create-vm]

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Inputs
        run: |
          VM_NAME="${{ github.event.client_payload.vmName }}"
          VM_SIZE="${{ github.event.client_payload.vmSize }}"

          if [ -z "$VM_NAME" ]; then
            echo "VM Name is missing"
            exit 1
          fi

          if [ -z "$VM_SIZE" ]; then
            echo "VM Size is missing"
            exit 1
          fi

          echo "Validation Successful"

      - name: Print Payload
        run: |
          echo "VM Name: ${{ github.event.client_payload.vmName }}"
          echo "VM Size: ${{ github.event.client_payload.vmSize }}"

---

  terraform:
    needs: validate
    runs-on: ubuntu-latest

    environment:
      name: Production   # 👈 THIS triggers approval gate

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set Terraform Variables
        run: |
          echo "TF_VAR_vm_name=${{ github.event.client_payload.vmName }}" >> $GITHUB_ENV
          echo "TF_VAR_vm_size=${{ github.event.client_payload.vmSize }}" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/
